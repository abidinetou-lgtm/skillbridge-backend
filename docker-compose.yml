services:
  app:
    build: .
    container_name: skillbridge-app
    ports:  
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/skillbridge
    depends_on:  
      - db

  db:
    image: postgres:16-alpine
    container_name: skillbridge-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: skillbridge
    ports:  
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: